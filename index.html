        <section>
          <h2>Frequently Asked Questions</h2>
          <dl>
            <dt>How does escrow payment work on Samsari?</dt>
            <dd>When you book a property on Samsari, you pay only 20% upfront as a deposit. Your payment is held securely by the platform — not sent directly to the host. The remaining 80% is paid at check-in. Funds are only released to the host after both parties confirm check-in and check-out through the app, eliminating the risk of scams or no-shows.</dd>
            <dt>What payment methods does Samsari accept?</dt>
            <dd>Samsari accepts international credit and debit cards (Visa, Mastercard) processed securely through Stripe. All payments are protected by escrow — your money is held safely until both host and guest confirm the stay.</dd>
            <dt>How does identity verification work?</dt>
            <dd>Every host and guest on Samsari must verify their identity using a government-issued ID (CIN or passport) and a selfie before they can book or list a property.</dd>
            <dt>Where is Samsari available?</dt>
            <dd>Samsari covers rentals across all 24 Tunisian governorates including Tunis, Hammamet, Sousse, Djerba, Monastir, Bizerte, Tabarka, Sfax, Nabeul, Tozeur, Mahdia, and Kelibia.</dd>
            <dt>What is Samsari's cancellation policy?</dt>
            <dd>Samsari offers a flexible cancellation policy. If you cancel before the check-in deadline, your deposit is fully refunded.</dd>
            <dt>How much does Samsari charge hosts?</dt>
            <dd>Samsari charges hosts a 9% platform commission on each booking. Hosts keep 91% of their rental income with no listing fees or hidden charges.</dd>
            <dt>How do I contact Samsari support?</dt>
            <dd>Samsari support is available Monday to Saturday, 9 AM to 6 PM, via WhatsApp and email at support@samsari.tn. Our local team speaks French, Arabic, and English.</dd>
          </dl>
